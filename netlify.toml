[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/agentpack run build"
  publish = "artifacts/agentpack/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
