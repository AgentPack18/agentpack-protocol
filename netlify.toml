[build]
  command = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/agentpack run build"
  publish = "artifacts/agentpack/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
