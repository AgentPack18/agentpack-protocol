kind = "web"
previewPath = "/"
title = "Agentpack Protocol"
version = "1.0.0"
id = "artifacts/agentpack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26141

[services.development]
run = "pnpm --filter @workspace/agentpack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agentpack", "run", "build" ]
publicDir = "artifacts/agentpack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26141"
BASE_PATH = "/"
